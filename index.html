<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة العملاء</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2330;
    --border: #2a3044;
    --accent: #4f8aff;
    --accent2: #00e5c0;
    --danger: #ff4f6a;
    --text: #e8ecf5;
    --text-muted: #6b7594;
    --radius: 12px;
    --font: 'IBM Plex Sans Arabic', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* ─── header ─── */
  .header {
    max-width: 1100px;
    margin: 0 auto 40px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--text-muted); font-weight: 300; }

  /* ─── layout ─── */
  .main { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* ─── cards ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .card-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* ─── stats ─── */
  .stats { display: flex; gap: 16px; flex-wrap: wrap; }

  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 24px;
    min-width: 130px;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }

  /* ─── form ─── */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.5px; }

  input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-muted); }

  /* ─── buttons ─── */
  .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  button {
    font-family: var(--font);
    font-size: 0.88rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: flex; align-items: center; gap: 6px;
  }

  button:active { transform: scale(0.97); }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }

  .btn-success { background: var(--accent2); color: #0d0f14; }
  .btn-success:hover { opacity: 0.88; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

  /* ─── search ─── */
  .search-wrap { position: relative; }
  .search-wrap input { padding-right: 40px; }
  .search-icon {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 14px;
  }

  /* ─── table ─── */
  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    padding: 12px 16px;
    text-align: right;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 13px 16px;
    font-size: 0.88rem;
    color: var(--text);
    text-align: right;
    vertical-align: middle;
  }

  td.muted { color: var(--text-muted); font-size: 0.82rem; }

  .actions { display: flex; gap: 8px; justify-content: flex-end; }

  .icon-btn {
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .icon-btn:hover { border-color: var(--danger); color: var(--danger); }
  .icon-btn.edit:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── modal ─── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 100;
    place-items: center;
  }

  .overlay.open { display: grid; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 480px;
    animation: pop .2s ease;
  }

  @keyframes pop {
    from { transform: scale(0.94); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--accent);
  }

  .modal-form { display: flex; flex-direction: column; gap: 14px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ─── toast ─── */
  .toast-wrap {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.85rem;
    animation: slideUp .25s ease;
    white-space: nowrap;
  }

  .toast.ok  { border-color: var(--accent2); color: var(--accent2); }
  .toast.err { border-color: var(--danger);  color: var(--danger); }

  @keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* ─── empty ─── */
  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .empty-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.4; }

  /* ─── loading ─── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin: auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<header class="header">
  <div class="logo">📋</div>
  <div>
    <h1>إدارة العملاء <span>/ CRM</span></h1>
  </div>
</header>

<main class="main">

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-label">إجمالي العملاء</div>
    </div>
  </div>

  <!-- Add Form -->
  <div class="card">
    <div class="card-label">إضافة عميل جديد</div>
    <div class="form-grid">
      <div class="field">
        <label>الاسم *</label>
        <input id="name" placeholder="محمد أحمد">
      </div>
      <div class="field">
        <label>الموبايل *</label>
        <input id="phone" placeholder="01xxxxxxxxx">
      </div>
      <div class="field">
        <label>الإيميل</label>
        <input id="email" type="email" placeholder="email@example.com">
      </div>
      <div class="field">
        <label>ملاحظات</label>
        <input id="notes" placeholder="أي ملاحظات...">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-success" onclick="addClient()">➕ إضافة عميل</button>
      <button class="btn-ghost" onclick="clearForm()">مسح</button>
    </div>
  </div>

  <!-- Search + Table -->
  <div class="card">
    <div class="card-label">قائمة العملاء</div>
    <div class="search-wrap" style="margin-bottom:20px;">
      <span class="search-icon">🔍</span>
      <input id="search" placeholder="بحث بالاسم أو الموبايل..." oninput="handleSearch()">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>الاسم</th>
            <th>الموبايل</th>
            <th>الإيميل</th>
            <th>ملاحظات</th>
            <th>تاريخ الإضافة</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6"><div class="spinner" style="margin:30px auto;"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- ─── Edit Modal ─── -->
<div class="overlay" id="editOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">✏️ تعديل بيانات العميل</div>
    <div class="modal-form">
      <input type="hidden" id="editId">
      <div class="field"><label>الاسم *</label><input id="editName" placeholder="الاسم"></div>
      <div class="field"><label>الموبايل *</label><input id="editPhone" placeholder="الموبايل"></div>
      <div class="field"><label>الإيميل</label><input id="editEmail" placeholder="الإيميل"></div>
      <div class="field"><label>ملاحظات</label><input id="editNotes" placeholder="ملاحظات"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="document.getElementById('editOverlay').classList.remove('open')">إلغاء</button>
      <button class="btn-primary" onclick="updateClient()">💾 حفظ التعديلات</button>
    </div>
  </div>
</div>

<!-- ─── Toast ─── -->
<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
// ════════════════════════════════════════════
//  CONFIG — from .env via Vite
// ════════════════════════════════════════════
const BASE_URL = "https://crm-be-pi.vercel.app/api";

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let searchTimer = null;

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
function toast(msg, type = "ok") {
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function formatDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("ar-EG", {
    year: "numeric", month: "short", day: "numeric"
  });
}

function clearForm() {
  ["name","phone","email","notes"].forEach(id =>
    document.getElementById(id).value = ""
  );
}

function closeModal(e) {
  if (e.target.id === "editOverlay")
    document.getElementById("editOverlay").classList.remove("open");
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
function renderTable(clients) {
  const tbody = document.getElementById("tableBody");
  document.getElementById("totalCount").textContent = clients.length;

  if (!clients.length) {
    tbody.innerHTML = `
      <tr><td colspan="6">
        <div class="empty">
          <div class="empty-icon">📭</div>
          لا يوجد عملاء مطابقون
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = clients.map(c => `
    <tr>
      <td><strong>${c.name}</strong></td>
      <td>${c.phone}</td>
      <td class="muted">${c.email || "—"}</td>
      <td class="muted">${c.notes || "—"}</td>
      <td class="muted">${formatDate(c.createdAt)}</td>
      <td>
        <div class="actions">
          <button class="icon-btn edit" onclick="openEdit('${c._id}','${c.name}','${c.phone}','${(c.email||'')}','${(c.notes||'')}')">✏️</button>
          <button class="icon-btn" onclick="deleteClient('${c._id}')">🗑</button>
        </div>
      </td>
    </tr>`).join("");
}

// ════════════════════════════════════════════
//  API CALLS
// ════════════════════════════════════════════
async function loadClients(search = "") {
  try {
    const url = search
      ? `${BASE_URL}/clients?search=${encodeURIComponent(search)}`
      : `${BASE_URL}/clients`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.success) renderTable(json.data);
  } catch (err) {
    toast("تعذّر الاتصال بالسيرفر", "err");
    document.getElementById("tableBody").innerHTML =
      `<tr><td colspan="6"><div class="empty"><div class="empty-icon">⚠️</div>تحقق من تشغيل الباك-إند</div></td></tr>`;
  }
}

async function addClient() {
  const name  = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const notes = document.getElementById("notes").value.trim();

  if (!name || !phone) { toast("الاسم والموبايل مطلوبان", "err"); return; }

  try {
    const res = await fetch(`${BASE_URL}/clients`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, email, notes })
    });
    const json = await res.json();
    if (json.success) {
      toast("✅ تم إضافة العميل");
      clearForm();
      loadClients(document.getElementById("search").value.trim());
    } else {
      toast(json.message || "خطأ في الإضافة", "err");
    }
  } catch { toast("تعذّر الاتصال بالسيرفر", "err"); }
}

async function deleteClient(id) {
  if (!confirm("تأكيد حذف العميل؟")) return;
  try {
    const res = await fetch(`${BASE_URL}/clients/${id}`, { method: "DELETE" });
    const json = await res.json();
    if (json.success) {
      toast("🗑 تم الحذف");
      loadClients(document.getElementById("search").value.trim());
    } else {
      toast(json.message || "خطأ في الحذف", "err");
    }
  } catch { toast("تعذّر الاتصال بالسيرفر", "err"); }
}

function openEdit(id, name, phone, email, notes) {
  document.getElementById("editId").value    = id;
  document.getElementById("editName").value  = name;
  document.getElementById("editPhone").value = phone;
  document.getElementById("editEmail").value = email;
  document.getElementById("editNotes").value = notes;
  document.getElementById("editOverlay").classList.add("open");
}

async function updateClient() {
  const id    = document.getElementById("editId").value;
  const name  = document.getElementById("editName").value.trim();
  const phone = document.getElementById("editPhone").value.trim();
  const email = document.getElementById("editEmail").value.trim();
  const notes = document.getElementById("editNotes").value.trim();

  if (!name || !phone) { toast("الاسم والموبايل مطلوبان", "err"); return; }

  try {
    const res = await fetch(`${BASE_URL}/clients/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, email, notes })
    });
    const json = await res.json();
    if (json.success) {
      toast("✅ تم التعديل");
      document.getElementById("editOverlay").classList.remove("open");
      loadClients(document.getElementById("search").value.trim());
    } else {
      toast(json.message || "خطأ في التعديل", "err");
    }
  } catch { toast("تعذّر الاتصال بالسيرفر", "err"); }
}

// ════════════════════════════════════════════
//  SEARCH — debounced
// ════════════════════════════════════════════
function handleSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    loadClients(document.getElementById("search").value.trim());
  }, 350);
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
loadClients();

// Expose functions to global scope for inline event handlers
window.addClient = addClient;
window.handleSearch = handleSearch;
window.clearForm = clearForm;
window.openEdit = openEdit;
window.deleteClient = deleteClient;
window.updateClient = updateClient;
window.closeModal = closeModal;
</script>

</body>
</html>
