<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة العملاء</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2330;
    --border: #2a3044;
    --accent: #4f8aff;
    --accent-hover: #6b9fff;
    --accent2: #00e5c0;
    --accent2-hover: #1aedd0;
    --danger: #ff4f6a;
    --danger-hover: #ff7085;
    --warning: #ffb347;
    --text: #e8ecf5;
    --text-muted: #6b7594;
    --white: #ffffff;
    --radius: 12px;
    --font: 'IBM Plex Sans Arabic', sans-serif;
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 12px;
    --space-lg: 16px;
    --space-xl: 20px;
    --space-2xl: 24px;
    --space-3xl: 40px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }

  .header {
    max-width: 1100px;
    margin: 0 auto var(--space-3xl);
    display: flex;
    align-items: center;
    gap: var(--space-md);
  }

  .logo {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: var(--radius);
    display: grid; place-items: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
  h1 span { color: var(--text-muted); font-weight: 300; }

  .main { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--space-xl); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-2xl);
  }

  .card-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: var(--space-lg);
  }

  .stats { display: flex; gap: var(--space-md); flex-wrap: wrap; }

  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: var(--space-lg) var(--space-xl);
    min-width: 130px;
  }

  .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
  }

  .field { display: flex; flex-direction: column; gap: var(--space-xs); }

  label { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.5px; }

  input, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px var(--space-md);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
    resize: none;
  }

  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,138,255,0.15); }
  input:focus-visible, textarea:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }
  input.error, textarea.error { border-color: var(--danger); }
  input:disabled, textarea:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-row { display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap; }

  button {
    font-family: var(--font);
    font-size: 0.88rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    padding: 10px var(--space-xl);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }

  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-primary { background: var(--accent); color: var(--white); }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

  .btn-success { background: var(--accent2); color: var(--bg); }
  .btn-success:hover:not(:disabled) { background: var(--accent2-hover); }

  .btn-danger { background: var(--danger); color: var(--white); }
  .btn-danger:hover:not(:disabled) { background: var(--danger-hover); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover:not(:disabled) { border-color: var(--text-muted); color: var(--text); }

  .search-wrap { position: relative; margin-bottom: var(--space-xl); }
  .search-wrap input { padding-right: 40px; }
  .search-icon {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    font-size: 14px;
  }
  .clear-search {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: var(--space-xs);
    font-size: 14px;
    display: none;
  }
  .clear-search.visible { display: block; }
  .clear-search:hover { color: var(--danger); }

  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    padding: var(--space-md) var(--space-lg);
    text-align: right;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 13px var(--space-lg);
    font-size: 0.88rem;
    color: var(--text);
    text-align: right;
    vertical-align: middle;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  td.muted { color: var(--text-muted); font-size: 0.82rem; }
  td a { color: var(--accent); text-decoration: none; }
  td a:hover { text-decoration: underline; }

  .actions { display: flex; gap: var(--space-sm); justify-content: flex-end; }

  .icon-btn {
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .icon-btn:hover { border-color: var(--danger); color: var(--danger); }
  .icon-btn.edit:hover { border-color: var(--accent); color: var(--accent); }

  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    z-index: 100;
    place-items: center;
    padding: var(--space-xl);
  }

  .overlay.open { display: grid; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: var(--space-2xl);
    width: 100%;
    max-width: 480px;
    animation: pop .2s ease;
  }

  @keyframes pop {
    from { transform: scale(0.94); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: var(--space-xl); color: var(--accent); }
  .modal-form { display: flex; flex-direction: column; gap: var(--space-md); }
  .modal-actions { display: flex; gap: var(--space-sm); justify-content: flex-end; margin-top: var(--space-xl); }

  .toast-wrap {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex; flex-direction: column; align-items: center; gap: var(--space-sm);
    pointer-events: none;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: var(--space-md) var(--space-xl);
    border-radius: 999px;
    font-size: 0.9rem;
    animation: slideUp .25s ease;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .toast.ok  { border-color: var(--accent2); color: var(--accent2); }
  .toast.err { border-color: var(--danger);  color: var(--danger); }
  .toast.warn { border-color: var(--warning); color: var(--warning); }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: var(--space-md); opacity: 0.4; }
  .empty .spinner { margin: 0 auto; }

  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }

  .required-star { color: var(--danger); margin-right: 2px; }

  @media (max-width: 600px) {
    body { padding: var(--space-xl) var(--space-md); }
    .card { padding: var(--space-lg); }
    h1 { font-size: 1.2rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">📋</div>
  <div><h1>إدارة العملاء <span>/ CRM</span></h1></div>
</header>

<main class="main">
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalCount">—</div>
      <div class="stat-label">إجمالي العملاء</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label" aria-hidden="true">إضافة عميل جديد</div>
    <div class="form-grid">
      <div class="field">
        <label>الاسم<span class="required-star">*</span></label>
        <input id="name" placeholder="محمد أحمد" autocomplete="name" onkeydown="if(event.key==='Enter')addClient()">
      </div>
      <div class="field">
        <label>الموبايل<span class="required-star">*</span></label>
        <input id="phone" placeholder="01xxxxxxxxx" onkeydown="if(event.key==='Enter')addClient()">
      </div>
      <div class="field">
        <label>الإيميل</label>
        <input id="email" type="email" placeholder="email@example.com" onkeydown="if(event.key==='Enter')addClient()">
      </div>
      <div class="field">
        <label>العنوان</label>
        <input id="address" placeholder="العنوان" onkeydown="if(event.key==='Enter')addClient()">
      </div>
      <div class="field">
        <label>ملاحظات</label>
        <input id="notes" placeholder="أي ملاحظات..." onkeydown="if(event.key==='Enter')addClient()">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-success" id="addBtn" onclick="addClient()">➕ إضافة عميل</button>
      <button class="btn-ghost" onclick="clearForm()">مسح</button>
    </div>
  </div>

  <div class="card">
    <div class="card-label" aria-hidden="true">قائمة العملاء</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" placeholder="بحث بالاسم أو الموبايل..." oninput="handleSearch()">
      <button class="clear-search" id="clearSearch" onclick="clearSearch()">✕</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>الاسم</th>
            <th>الموبايل</th>
            <th>الإيميل</th>
            <th>العنوان</th>
            <th>ملاحظات</th>
            <th>تاريخ الإضافة</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="7"><div class="empty"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Edit Modal -->
<div class="overlay" id="editOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">✏️ تعديل بيانات العميل</div>
    <div class="modal-form">
      <input type="hidden" id="editId">
      <div class="field"><label>الاسم<span class="required-star">*</span></label><input id="editName" placeholder="الاسم"></div>
      <div class="field"><label>الموبايل<span class="required-star">*</span></label><input id="editPhone" placeholder="الموبايل"></div>
      <div class="field"><label>الإيميل</label><input id="editEmail" type="email" placeholder="الإيميل"></div>
      <div class="field"><label>العنوان</label><input id="editAddress" placeholder="العنوان"></div>
      <div class="field"><label>ملاحظات</label><input id="editNotes" placeholder="ملاحظات"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeEditModal()">إلغاء</button>
      <button class="btn-primary" id="updateBtn" onclick="updateClient()">💾 حفظ التعديلات</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="overlay" id="deleteOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()" style="max-width: 380px;">
    <div class="modal-title">🗑 تأكيد الحذف</div>
    <p style="color: var(--text-muted); margin-bottom: 20px;">هل أنت متأكد من حذف هذا العميل؟ لا يمكن التراجع عن هذا الإجراء.</p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="document.getElementById('deleteOverlay').classList.remove('open')">إلغاء</button>
      <button class="btn-danger" id="deleteBtn" onclick="confirmDelete()">حذف</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
const BASE_URL = "http://localhost:5000/api";

let searchTimer = null;
let pendingDeleteId = null;

function $(id) { return document.getElementById(id); }

function toast(msg, type = "ok") {
  const wrap = $("toastWrap");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function formatDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("ar-EG", { year: "numeric", month: "short", day: "numeric" });
}

function clearForm() {
  ["name","phone","email","address","notes"].forEach(id => {
    const el = $(id);
    el.value = "";
    el.classList.remove("error");
  });
  $("name").focus();
}

function clearSearch() {
  $("search").value = "";
  $("clearSearch").classList.remove("visible");
  loadClients();
}

function closeEditModal() {
  $("editOverlay").classList.remove("open");
}

function closeModal(e) {
  if (e.target.classList.contains("overlay")) {
    e.target.classList.remove("open");
  }
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

function renderTable(clients) {
  const tbody = $("tableBody");
  $("totalCount").textContent = clients.length;

  if (!clients.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">📭</div>لا يوجد عملاء</div></td></tr>`;
    return;
  }

  tbody.innerHTML = clients.map(c => `
    <tr>
      <td><strong>${escapeHtml(c.name)}</strong></td>
      <td>${escapeHtml(c.phone)}</td>
      <td class="muted">${c.email ? `<a href="mailto:${escapeHtml(c.email)}">${escapeHtml(c.email)}</a>` : "—"}</td>
      <td title="${escapeHtml(c.address||'')}">${c.address ? escapeHtml(c.address) : "—"}</td>
      <td title="${escapeHtml(c.notes||'')}">${c.notes ? escapeHtml(c.notes) : "—"}</td>
      <td class="muted">${formatDate(c.createdAt)}</td>
      <td>
        <div class="actions">
          <button class="icon-btn edit" onclick="openEdit('${c._id}','${escapeHtml(c.name)}','${escapeHtml(c.phone)}','${escapeHtml(c.email||'')}','${escapeHtml(c.address||'')}','${escapeHtml(c.notes||'')}')">✏️</button>
          <button class="icon-btn" onclick="promptDelete('${c._id}')">🗑</button>
        </div>
      </td>
    </tr>`).join("");
}

async function loadClients(search = "") {
  try {
    $("tableBody").innerHTML = `<tr><td colspan="7"><div class="empty"><div class="spinner" style="margin:0 auto;"></div></div></td></tr>`;
    const url = search ? `${BASE_URL}/clients?search=${encodeURIComponent(search)}` : `${BASE_URL}/clients`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.success) {
      renderTable(json.data);
      $("clearSearch").classList.toggle("visible", search.length > 0);
    }
  } catch {
    toast("تعذّر الاتصال بالسيرفر", "err");
    $("tableBody").innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">⚠️</div>تحقق من تشغيل الباك-إند</div></td></tr>`;
  }
}

async function addClient() {
  const name = $("name").value.trim();
  const phone = $("phone").value.trim();
  const email = $("email").value.trim();
  const address = $("address").value.trim();
  const notes = $("notes").value.trim();

  $("name").classList.remove("error");
  $("phone").classList.remove("error");

  if (!name) { toast("الاسم مطلوب", "err"); $("name").classList.add("error"); $("name").focus(); return; }
  if (!phone) { toast("الموبايل مطلوب", "err"); $("phone").classList.add("error"); $("phone").focus(); return; }

  const btn = $("addBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span> جاري الإضافة...';

  try {
    const res = await fetch(`${BASE_URL}/clients`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, email, address, notes })
    });
    const json = await res.json();
    if (json.success) {
      toast("✅ تم إضافة العميل");
      clearForm();
      loadClients($("search").value.trim());
    } else {
      toast(json.message || "خطأ في الإضافة", "err");
    }
  } catch { toast("تعذّر الاتصال بالسيرفر", "err"); }
  finally {
    btn.disabled = false;
    btn.innerHTML = "➕ إضافة عميل";
  }
}

function promptDelete(id) {
  pendingDeleteId = id;
  $("deleteOverlay").classList.add("open");
}

async function confirmDelete() {
  if (!pendingDeleteId) return;
  const btn = $("deleteBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span>';

  try {
    const res = await fetch(`${BASE_URL}/clients/${pendingDeleteId}`, { method: "DELETE" });
    const json = await res.json();
    if (json.success) {
      toast("🗑 تم الحذف");
      $("deleteOverlay").classList.remove("open");
      loadClients($("search").value.trim());
    } else {
      toast(json.message || "خطأ في الحذف", "err");
    }
  } catch { toast("تعذّر الاتصال بالسيرفر", "err"); }
  finally {
    btn.disabled = false;
    btn.innerHTML = "حذف";
    pendingDeleteId = null;
  }
}

function openEdit(id, name, phone, email, address, notes) {
  $("editId").value = id;
  $("editName").value = name;
  $("editPhone").value = phone;
  $("editEmail").value = email;
  $("editAddress").value = address;
  $("editNotes").value = notes;
  $("editOverlay").classList.add("open");
  setTimeout(() => $("editName").focus(), 100);
}

async function updateClient() {
  const id = $("editId").value;
  const name = $("editName").value.trim();
  const phone = $("editPhone").value.trim();
  const email = $("editEmail").value.trim();
  const address = $("editAddress").value.trim();
  const notes = $("editNotes").value.trim();

  $("editName").classList.remove("error");
  $("editPhone").classList.remove("error");

  if (!name) { toast("الاسم مطلوب", "err"); $("editName").classList.add("error"); return; }
  if (!phone) { toast("الموبايل مطلوب", "err"); $("editPhone").classList.add("error"); return; }

  const btn = $("updateBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner"></span> جاري الحفظ...';

  try {
    const res = await fetch(`${BASE_URL}/clients/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, email, address, notes })
    });
    const json = await res.json();
    if (json.success) {
      toast("✅ تم التعديل");
      closeEditModal();
      loadClients($("search").value.trim());
    } else {
      toast(json.message || "خطأ في التعديل", "err");
    }
  } catch { toast("تعذّر الاتصال بالسيرفر", "err"); }
  finally {
    btn.disabled = false;
    btn.innerHTML = "💾 حفظ التعديلات";
  }
}

function handleSearch() {
  clearTimeout(searchTimer);
  const val = $("search").value.trim();
  searchTimer = setTimeout(() => loadClients(val), 300);
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    $("editOverlay").classList.remove("open");
    $("deleteOverlay").classList.remove("open");
  }
});

loadClients();

window.addClient = addClient;
window.handleSearch = handleSearch;
window.clearForm = clearForm;
window.clearSearch = clearSearch;
window.openEdit = openEdit;
window.promptDelete = promptDelete;
window.confirmDelete = confirmDelete;
window.updateClient = updateClient;
window.closeModal = closeModal;
window.closeEditModal = closeEditModal;
</script>
</body>
</html>
